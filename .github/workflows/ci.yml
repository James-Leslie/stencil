name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Installs and activates the tools pinned in mise.toml (python, node, prek, just),
      # so CI uses the same runtime definition as local development.
      - name: Set up mise
        uses: jdx/mise-action@v4

      # uv is machine-level locally (not in mise.toml), so CI installs it explicitly.
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync

      # Run the same hooks as local development so prek.toml is the single
      # source of truth for linting, formatting, and type checking (and their
      # pinned versions). Fixers run in place; if any hook modifies a file the
      # step exits non-zero, which blocks the PR — exactly the gate we want.
      - name: Run prek hooks
        run: prek run --all-files

      - name: Test
        run: uv run pytest
