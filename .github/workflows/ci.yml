name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. a new push to a PR) so CI
# isn't doing redundant work on stale commits.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Installs and activates the tools pinned in mise.toml (python, prek),
      # so CI uses the same runtime definition as local development.
      - name: Set up mise
        uses: jdx/mise-action@v4

      # uv is machine-level locally (not in mise.toml), so CI installs it explicitly.
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync

      # Run the same `check` task as local development so mise.toml is the
      # single source of truth for the gate: it runs pytest, then the full
      # prek hook suite (lint, format, type checking, with versions pinned in
      # prek.toml). Fixers run in place; if any hook modifies a file the step
      # exits non-zero, which blocks the PR — exactly the gate we want.
      - name: Run checks
        run: mise run check
