name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Installs and activates the tools pinned in mise.toml (python, node, prek, just),
      # so CI uses the exact same runtime definition as local development.
      - name: Set up mise
        uses: jdx/mise-action@v4

      - name: Sync dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv check

      - name: Test
        run: uv run pytest
